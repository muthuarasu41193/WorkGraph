name: Vercel Production Deployment

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
  VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Trigger deploy hook (optional)
        if: ${{ secrets.VERCEL_DEPLOY_HOOK != '' }}
        run: curl -fsS -X POST "$VERCEL_DEPLOY_HOOK"
        env:
          VERCEL_DEPLOY_HOOK: ${{ secrets.VERCEL_DEPLOY_HOOK }}

      - name: Setup Node
        if: ${{ secrets.VERCEL_TOKEN != '' }}
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        if: ${{ secrets.VERCEL_TOKEN != '' }}
        run: npm ci

      - name: Install Vercel CLI
        if: ${{ secrets.VERCEL_TOKEN != '' }}
        run: npm install -g vercel@latest

      - name: Pull Vercel environment
        if: ${{ secrets.VERCEL_TOKEN != '' }}
        run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}

      - name: Build for production
        if: ${{ secrets.VERCEL_TOKEN != '' }}
        run: vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}

      - name: Deploy to production
        if: ${{ secrets.VERCEL_TOKEN != '' }}
        run: vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }}

      - name: No Vercel credentials configured
        if: ${{ secrets.VERCEL_TOKEN == '' && secrets.VERCEL_DEPLOY_HOOK == '' }}
        run: |
          echo "::warning::Skipping Vercel deploy — add VERCEL_DEPLOY_HOOK or VERCEL_TOKEN + VERCEL_ORG_ID + VERCEL_PROJECT_ID in GitHub repo secrets, or redeploy manually at vercel.com."
          exit 0
