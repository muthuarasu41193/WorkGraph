name: Community jobs ingest (Reddit + RSS)

on:
  schedule:
    - cron: "30 */6 * * *"
  workflow_dispatch:

jobs:
  ingest-community:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: job_aggregator
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: job_aggregator/requirements-ingest.txt
      - name: Install dependencies
        run: pip install -r requirements-ingest.txt
      - name: Ingest Reddit + RSS community posts
        env:
          DATABASE_PASSWORD: ${{ secrets.DATABASE_PASSWORD }}
          SUPABASE_PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF }}
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          REDDIT_SUBREDDITS: ${{ vars.REDDIT_SUBREDDITS }}
          RSS_FEED_URLS: ${{ vars.RSS_FEED_URLS }}
          DATABASE_POOLER_HOST: ${{ secrets.DATABASE_POOLER_HOST }}
        run: python -m app.main ingest-community
