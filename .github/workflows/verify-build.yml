name: Verify production build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Verify Vercel config
        run: npm run verify:vercel-config

      - name: Production build (Vercel-like env)
        run: npm run build
        env:
          NODE_ENV: production
          # Mimics Vercel when AUTH_PROVIDER is set without SuperTokens URI.
          AUTH_PROVIDER: supertokens
          NEXT_PUBLIC_AUTH_PROVIDER: supertokens
