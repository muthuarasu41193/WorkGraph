# Keeps public.jobs populated so your deployed Next.js profile shows the live feed.
#
# Setup (GitHub → repo → Settings → Secrets and variables → Actions):
#   JOBS_DATABASE_URL — full SQLAlchemy URL, e.g. postgresql+psycopg2://postgres.PROJECTREF:PASSWORD@aws-0-REGION.pooler.supabase.com:5432/postgres?sslmode=require
#     (Supabase Dashboard → Connect → Session pooler → copy URI, then change scheme to postgresql+psycopg2 if needed.)
#
# Optional: instead of JOBS_DATABASE_URL, leave it unset and add all of:
#   SUPABASE_DB_PASSWORD — DB password from Supabase → Database
#   NEXT_PUBLIC_SUPABASE_URL — same as Vercel (https://<ref>.supabase.co), OR set SUPABASE_PROJECT_REF alone
#   Plus EITHER:
#     SUPABASE_POOLER_HOST — full Session pooler hostname from Connect (recommended; matches aws-0 vs aws-1)
#   OR:
#     SUPABASE_POOLER_REGION — e.g. ap-south-1 (workflow builds aws-0-{region}; wrong prefix breaks login)
#   Optional: DATABASE_POOLER_AWS_PREFIX secret — set to aws-1 if Connect shows aws-1-<region>.pooler.supabase.com
#
# Easiest CI option (no DB password / pooler):
#   SUPABASE_SERVICE_ROLE_KEY — Dashboard → Settings → API Keys → Secret (server-only).
#   NEXT_PUBLIC_SUPABASE_URL or SUPABASE_PROJECT_REF — same project as production.
#
# Apply SQL migrations on the Supabase project first (public.jobs + RLS), then push this workflow to the default branch.

name: Sync ATS jobs to Supabase

on:
  workflow_dispatch:
  schedule:
    # Twice daily India Standard Time (IST = UTC+5:30): 06:00 and 15:00 IST
    - cron: "30 0 * * *" # 00:30 UTC → 06:00 IST
    - cron: "30 9 * * *" # 09:30 UTC → 15:00 IST

concurrency:
  group: supabase-jobs-ingest
  cancel-in-progress: false

jobs:
  ingest:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    defaults:
      run:
        working-directory: job_aggregator

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: job_aggregator/requirements-ingest.txt

      - name: Install ingest dependencies
        run: pip install -r requirements-ingest.txt

      - name: Run ATS ingest (no embeddings)
        env:
          DATABASE_URL: ${{ secrets.JOBS_DATABASE_URL }}
          DATABASE_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
          DATABASE_POOLER_HOST: ${{ secrets.SUPABASE_POOLER_HOST }}
          DATABASE_POOLER_AWS_PREFIX: ${{ secrets.DATABASE_POOLER_AWS_PREFIX }}
          DATABASE_POOLER_REGION: ${{ secrets.SUPABASE_POOLER_REGION }}
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          INGEST_PRUNE_MISSING: ${{ vars.INGEST_PRUNE_MISSING }}
          INGEST_PRUNE_MIN_FETCHED: ${{ vars.INGEST_PRUNE_MIN_FETCHED }}
        run: |
          if [ -n "$DATABASE_URL" ]; then
            echo "Using DATABASE_URL from JOBS_DATABASE_URL secret."
          elif [ -n "$DATABASE_PASSWORD" ] && { [ -n "$DATABASE_POOLER_HOST" ] || [ -n "$DATABASE_POOLER_REGION" ]; } && { [ -n "$NEXT_PUBLIC_SUPABASE_URL" ] || [ -n "$SUPABASE_PROJECT_REF" ]; }; then
            echo "Using pooler env vars (no JOBS_DATABASE_URL)."
          elif [ -n "$SUPABASE_SERVICE_ROLE_KEY" ] && { [ -n "$NEXT_PUBLIC_SUPABASE_URL" ] || [ -n "$SUPABASE_PROJECT_REF" ]; }; then
            echo "Using Supabase REST ingest (SUPABASE_SERVICE_ROLE_KEY — no Postgres password needed)."
          else
            echo "::error::Set JOBS_DATABASE_URL, or SUPABASE_DB_PASSWORD + pooler host/region + URL/ref, or SUPABASE_SERVICE_ROLE_KEY + NEXT_PUBLIC_SUPABASE_URL (or SUPABASE_PROJECT_REF). See workflow comments."
            exit 1
          fi
          python -m app.main ingest --no-embed
