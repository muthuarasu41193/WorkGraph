# WorkGraph — self-hosted stack (Coolify / docker compose compatible)
# Core: docker compose -f infrastructure/docker-compose.yml up -d
# Full:  docker compose -f infrastructure/docker-compose.yml --profile full up -d

name: workgraph

x-api-env: &api-env
  DATABASE_URL: postgresql+psycopg2://workgraph:${POSTGRES_PASSWORD:-workgraph_dev}@postgres:5432/workgraph
  REDIS_URL: redis://redis:6379/0
  MINIO_ENDPOINT: minio:9000
  MINIO_ACCESS_KEY: ${MINIO_ROOT_USER:-workgraph}
  MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD:-workgraph_minio_dev}
  MINIO_BUCKET_RESUMES: resumes
  OLLAMA_BASE_URL: http://ollama:11434
  OLLAMA_MODEL: ${OLLAMA_MODEL:-deepseek-r1:1.5b}
  TYPESENSE_HOST: typesense
  TYPESENSE_PORT: "8108"
  TYPESENSE_API_KEY: ${TYPESENSE_API_KEY:-workgraph_typesense_dev}
  EMBEDDING_MODEL_NAME: sentence-transformers/all-MiniLM-L6-v2
  WORKGRAPH_ENV: ${WORKGRAPH_ENV:-development}

services:
  postgres:
    image: pgvector/pgvector:pg16
    restart: unless-stopped
    environment:
      POSTGRES_USER: workgraph
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-workgraph_dev}
      POSTGRES_DB: workgraph
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ../migrations/postgres:/docker-entrypoint-initdb.d:ro
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U workgraph -d workgraph"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    ports:
      - "${REDIS_PORT:-6379}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  minio:
    image: minio/minio:latest
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-workgraph}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-workgraph_minio_dev}
    volumes:
      - minio_data:/data
    ports:
      - "${MINIO_API_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_PORT:-9001}:9001"
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  minio-init:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_started
    entrypoint: >
      /bin/sh -c "
      mc alias set wg http://minio:9000 $${MINIO_ROOT_USER:-workgraph} $${MINIO_ROOT_PASSWORD:-workgraph_minio_dev};
      mc mb -p wg/resumes || true;
      mc mb -p wg/avatars || true;
      mc mb -p wg/attachments || true;
      mc anonymous set download wg/avatars || true;
      exit 0;
      "
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-workgraph}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-workgraph_minio_dev}

  typesense:
    image: typesense/typesense:27.1
    restart: unless-stopped
    environment:
      TYPESENSE_DATA_DIR: /data
      TYPESENSE_API_KEY: ${TYPESENSE_API_KEY:-workgraph_typesense_dev}
      TYPESENSE_ENABLE_CORS: "true"
    volumes:
      - typesense_data:/data
    ports:
      - "${TYPESENSE_PORT:-8108}:8108"
    command: "--data-dir /data --api-key=${TYPESENSE_API_KEY:-workgraph_typesense_dev} --enable-cors"

  ollama:
    image: ollama/ollama:latest
    restart: unless-stopped
    volumes:
      - ollama_data:/root/.ollama
    ports:
      - "${OLLAMA_PORT:-11434}:11434"
    profiles: ["ai", "full"]

  api:
    build:
      context: ../job_aggregator
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      <<: *api-env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "${API_PORT:-8000}:8000"
    command: ["uvicorn", "app.api.main:app", "--host", "0.0.0.0", "--port", "8000"]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 60s

  worker:
    build:
      context: ../services/worker
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      REDIS_URL: redis://redis:6379/0
      WORKGRAPH_API_URL: http://api:8000
      <<: *api-env
    depends_on:
      redis:
        condition: service_healthy
      api:
        condition: service_healthy

  web:
    build:
      context: ..
      dockerfile: Dockerfile.web
    restart: unless-stopped
    environment:
      WORKGRAPH_API_URL: http://api:8000
      NEXT_PUBLIC_WORKGRAPH_API_URL: ${NEXT_PUBLIC_WORKGRAPH_API_URL:-http://localhost:8000}
      NODE_ENV: production
    depends_on:
      api:
        condition: service_healthy
    ports:
      - "${WEB_PORT:-3000}:3000"

  # --- Optional profiles (full self-hosted platform) ---

  supertokens:
    image: registry.supertokens.io/supertokens/supertokens-postgresql
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      POSTGRESQL_CONNECTION_URI: postgresql://workgraph:${POSTGRES_PASSWORD:-workgraph_dev}@postgres:5432/supertokens
    ports:
      - "3567:3567"
    profiles: ["auth", "full"]

  n8n:
    image: n8nio/n8n:latest
    restart: unless-stopped
    environment:
      DB_TYPE: postgresdb
      DB_POSTGRESDB_HOST: postgres
      DB_POSTGRESDB_PORT: 5432
      DB_POSTGRESDB_DATABASE: n8n
      DB_POSTGRESDB_USER: workgraph
      DB_POSTGRESDB_PASSWORD: ${POSTGRES_PASSWORD:-workgraph_dev}
      N8N_BASIC_AUTH_ACTIVE: "true"
      N8N_BASIC_AUTH_USER: ${N8N_USER:-admin}
      N8N_BASIC_AUTH_PASSWORD: ${N8N_PASSWORD:-workgraph_n8n}
    ports:
      - "5678:5678"
    profiles: ["automation", "full"]

  posthog:
    image: posthog/posthog:latest
    restart: unless-stopped
    profiles: ["analytics", "full"]
    # See docs/DEPLOYMENT.md for full PostHog env (requires separate DB + ClickHouse in production)

  grafana:
    image: grafana/grafana:latest
    restart: unless-stopped
    volumes:
      - grafana_data:/var/lib/grafana
    ports:
      - "3001:3000"
    profiles: ["monitoring", "full"]

  prometheus:
    image: prom/prometheus:latest
    restart: unless-stopped
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    ports:
      - "9090:9090"
    profiles: ["monitoring", "full"]

  uptime-kuma:
    image: louislam/uptime-kuma:1
    restart: unless-stopped
    volumes:
      - uptime_kuma_data:/app/data
    ports:
      - "3002:3001"
    profiles: ["monitoring", "full"]

volumes:
  postgres_data:
  redis_data:
  minio_data:
  typesense_data:
  ollama_data:
  grafana_data:
  uptime_kuma_data:
